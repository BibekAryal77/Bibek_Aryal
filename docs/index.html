<!-- This is the Home page. It "extends" base.html, so it automatically gets the
     navbar, footer, and CSS link from base.html. We only need to write the middle part. -->
<!-- base.html -->
<!-- This is the shared layout for every page: it has the head, the navigation bar,
     and the footer. Other pages "extend" this file and fill in the content block below. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the site scale correctly on phones and tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- The title block below lets each page set its own browser tab title -->
    <title>Home | Bibek Aryal</title>

    <!-- Link to our CSS file. url_for() builds the correct path to static files. -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Navigation bar shown on every page -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Bibek Aryal</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="about/index.html">About</a>
                <a href="projects/index.html">Projects</a>
                <a href="skills/index.html">Skills</a>
                <a href="contact/index.html">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Main content area: each page fills this block with its own content -->
    <main class="content">
        
<section class="hero">
    <img src="static/images/profile.jpg"
         alt="Photo of Bibek Aryal" class="profile-pic">

    <h1>Bibek Aryal</h1>
    <h2>Ph.D. Student in Mechanical Engineering</h2>

    <p class="intro">
        I work on heat transfer, two-phase flow, flow boiling, CFD simulation,
        and machine-learning-based thermal-fluid modeling.
    </p>

    <!-- Buttons that link to the other pages -->
    <div class="button-group">
        <a href="about/index.html" class="btn">About</a>
        <a href="projects/index.html" class="btn">Projects</a>
        <a href="skills/index.html" class="btn">Skills</a>
        <a href="contact/index.html" class="btn">Contact</a>
    </div>
</section>

    </main>

    <!-- Footer shown on every page -->
    <footer class="footer">
        <p>&copy; 2026 Bibek Aryal. All rights reserved.</p>
    </footer>

</body>
</html>
