<!-- projects.html -->
<!-- The Projects page. "projects" is a list of dictionaries passed in from app.py.
     We loop over it and build one "card" per project. -->
{% extends "base.html" %}

{% block title %}Projects | Bibek Aryal{% endblock %}

{% block content %}
<section class="page-section">
    <h1>Projects</h1>

    <div class="project-grid">
        <!-- Loop through each project dictionary in the list -->
        {% for project in projects %}
        <div class="project-card">
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
            <p class="tools"><strong>Tools:</strong> {{ project.tools }}</p>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
