<!-- base.html -->
<!-- This is the shared layout for every page: it has the head, the navigation bar,
     and the footer. Other pages "extend" this file and fill in the content block below. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the site scale correctly on phones and tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- The title block below lets each page set its own browser tab title -->
    <title>{% block title %}Bibek Aryal{% endblock %}</title>

    <!-- Link to our CSS file. url_for() builds the correct path to static files. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigation bar shown on every page -->
    <header class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="nav-logo">Bibek Aryal</a>
            <nav class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">About</a>
                <a href="{{ url_for('projects_page') }}">Projects</a>
                <a href="{{ url_for('skills_page') }}">Skills</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Main content area: each page fills this block with its own content -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer shown on every page -->
    <footer class="footer">
        <p>&copy; 2026 Bibek Aryal. All rights reserved.</p>
    </footer>

</body>
</html>
